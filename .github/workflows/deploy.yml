name: Build & Deploy Identity Service

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest # GitHub hosted runner

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # Login to DockerHub
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Build Docker Image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_IMAGE_NAME }}:latest .

      # Push Docker Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME }}:latest

      # Install SSH
      - name: Install SSH
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      # Deploy to Server (Oracle/EC2)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }} # or ORACLE_HOST
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_IMAGE_NAME }}:latest
            docker rm -f fleetbharat-identity || true
            docker run -d \
              --name fleetbharat-identity \
              --network fleetbharat-net \
              -p 8080:8080 \
              -v /var/www/fleetbharat/uploads:/app/uploads \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e ConnectionStrings__Default='${{ secrets.PROD_CONN }}' \
              --restart always \
              ${{ secrets.DOCKER_IMAGE_NAME }}:latest
