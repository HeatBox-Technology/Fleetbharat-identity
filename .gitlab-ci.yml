image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

before_script:
  - test -n "$DOCKERHUB_USERNAME" || (echo "DOCKERHUB_USERNAME is not set" && exit 1)
  - test -n "$DOCKERHUB_PASSWORD" || (echo "DOCKERHUB_PASSWORD is not set" && exit 1)
  - test -n "$DOCKER_IMAGE_NAME" || (echo "DOCKER_IMAGE_NAME is not set" && exit 1)
  - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build_and_push:
  stage: build
  rules:
    - when: always
  script:
    - docker build -t $DOCKER_IMAGE_NAME:latest .
    - docker push $DOCKER_IMAGE_NAME:latest

deploy_to_ec2:
  stage: deploy
  image: alpine:latest
  rules:
    - when: always
  before_script:
    - apk add --no-cache openssh
    - test -n "$EC2_HOST" || (echo "EC2_HOST is not set" && exit 1)
    - test -n "$EC2_USER" || (echo "EC2_USER is not set" && exit 1)
    - test -n "$EC2_SSH_KEY" || (echo "EC2_SSH_KEY is not set" && exit 1)
    - test -n "$PROD_CONN" || (echo "PROD_CONN is not set" && exit 1)
    - mkdir -p ~/.ssh
    - printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - touch ~/.ssh/known_hosts
    - ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts || echo "ssh-keyscan failed, continuing with StrictHostKeyChecking=accept-new"
  script:
    - |
      ssh -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" "
        docker pull worknggupta/fleetbharat-identity:latest &&
        docker rm -f fleetbharat-identity || true &&
        docker run -d \
          --name fleetbharat-identity \
          --network fleetbharat-net \
          -p 8080:8080 \
          -v /var/www/fleetbharat/uploads:/app/uploads \
          -e ASPNETCORE_ENVIRONMENT=Production \
          -e ASPNETCORE_URLS=http://+:8080 \
          -e ConnectionStrings__Default='$PROD_CONN' \
          --restart always \
          worknggupta/fleetbharat-identity:latest
      "
