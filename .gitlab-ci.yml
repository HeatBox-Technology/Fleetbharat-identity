image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

before_script:
  - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"

build_and_push:
  stage: build
  rules:
    - when: always
  script:
    - docker build -t $DOCKER_IMAGE_NAME:latest .
    - docker push $DOCKER_IMAGE_NAME:latest

deploy_to_ec2:
  stage: deploy
  image: alpine:latest
  rules:
    - when: always
  before_script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $EC2_USER@$EC2_HOST "
      docker pull $DOCKER_IMAGE_NAME:latest &&
      docker rm -f fleetbharat-identity || true &&
      docker run -d --name fleetbharat-identity --network fleetbharat-net -p 8080:8080 \
      -e ASPNETCORE_ENVIRONMENT=Production \
      -e ASPNETCORE_URLS=http://+:8080 \
      -e ConnectionStrings__Default='$PROD_CONN' \
      --restart always \
      $DOCKER_IMAGE_NAME:latest
      "
