image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

before_script:
  - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"

build_and_push:
  stage: build
  rules:
    - when: always
  script:
    - docker build -t $DOCKER_IMAGE_NAME:latest .
    - docker push $DOCKER_IMAGE_NAME:latest

deploy_to_oci:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - printf "%s" "$APP_SSH_KEY" > ~/.ssh/vm-access.pem
    - chmod 600 ~/.ssh/vm-access.pem
  script:
    - ssh -o StrictHostKeyChecking=no -i ~/.ssh/vm-access.pem $APP_USER@$APP_HOST "
        docker pull $DOCKER_IMAGE_NAME:latest &&
        docker rm -f fleetbharat-identity || true &&
        docker run -d \
          --name fleetbharat-identity \
          --network fleetbharat-net \
          -p 8080:8080 \
          -v /var/www/fleetbharat/uploads:/app/uploads \
          -e ASPNETCORE_ENVIRONMENT=Production \
          -e ASPNETCORE_URLS=http://+:8080 \
          -e ConnectionStrings__Default='$PROD_CONN' \
          --restart always \
          $DOCKER_IMAGE_NAME:latest
      "